<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://www.instagram.com/rachelmakes.store">
  <link rel="canonical" href="https://www.instagram.com/rachelmakes.store">
  <title>Redirecting…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    /* Invisible during the instant redirect; fades in only if it fails */
    p { opacity: 0; animation: reveal 0.5s ease 2s forwards; }
    @keyframes reveal { to { opacity: 1; } }
  </style>
</head>
<body>
  <p><a href="https://www.instagram.com/rachelmakes.store">Click here if you are not redirected.</a></p>
  <script>window.location.replace("https://www.instagram.com/rachelmakes.store");</script>
</body>
</html>
