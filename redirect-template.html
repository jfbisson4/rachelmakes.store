<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- HOW TO ADD A REDIRECT:
       1. Copy this file to <path>/index.html (e.g. instagram/index.html
          makes rachelmakes.store/instagram redirect).
       2. Replace https://example.com in all FOUR places below. -->
  <meta http-equiv="refresh" content="0; url=https://example.com">
  <link rel="canonical" href="https://example.com">
  <title>Redirecting…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    /* Invisible during the instant redirect; fades in only if it fails */
    p { opacity: 0; animation: reveal 0.5s ease 2s forwards; }
    @keyframes reveal { to { opacity: 1; } }
  </style>
</head>
<body>
  <p><a href="https://example.com">Click here if you are not redirected.</a></p>
  <script>window.location.replace("https://example.com");</script>
</body>
</html>
